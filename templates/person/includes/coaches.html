{% load wagtailimages_tags wagtailcore_tags %}
<section class="page-section">
    <div class="site-frame">
        <div class="coach-feature">
            <div class="coach-feature__media">
                {% image coach.person_page.specific.image fill-900x900 class="img-fluid" %}
            </div>
            <div class="coach-feature__content surface-card">
                <h2 class="section-heading mb-4">
                    <span class="section-heading-upper">{% if coach.squad.squad %}{{ coach.squad.squad }} · {% endif %}{{ coach.position.title }}</span>
                    <span class="section-heading-lower">{{ coach.person_page.title }}</span>
                </h2>
                <div class="prose">{{ coach.person_page.specific.bio|safe }}</div>
            </div>
        </div>
    </div>
</section>
