{% load navigation_tags wagtailcore_tags %}
{% get_site_root as site_root %}

{% for menuitem in menuitems %}
<li class="nav-item {% if menuitem.active %}active{% endif %}{% if menuitem.show_dropdown %} dropdown{% endif %}">
    {% if menuitem.show_dropdown %}
    <a href="{% pageurl menuitem %}" class="nav-link dropdown-toggle" id="nav-{{ menuitem.slug }}" data-toggle="dropdown"
       aria-haspopup="true" aria-expanded="false">{{ menuitem.title }}</a>
    {% top_menu_children parent=menuitem %}
    {% else %}
    <a href="{% pageurl menuitem %}" role="menuitem" class="nav-link">{{ menuitem.title }}</a>
    {% endif %}
</li>
{% endfor %}
