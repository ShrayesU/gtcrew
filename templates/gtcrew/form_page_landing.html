{% extends "base_page.html" %}
{% load wagtailcore_tags %}

{% block content %}
<div class="site-frame">
    <section class="page-hero">
        <div class="page-hero__panel hero-panel">
            <div class="page-hero__content">
                <span class="page-hero__eyebrow">Submission Received</span>
                <h1 class="page-hero__title">Thank you.</h1>
                <p class="page-hero__text">We’ve got your message and someone from Georgia Tech Rowing will follow up soon.</p>
            </div>
        </div>
    </section>

    <section class="page-section">
        <div class="content-grid content-grid--narrow">
            <div class="bg-faded rounded p-5 prose">
                {{ page.thank_you_text|richtext }}
            </div>
        </div>
    </section>
</div>
{% endblock content %}
