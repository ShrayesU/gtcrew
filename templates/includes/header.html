{% load navigation_tags %}

{% get_site_root as site_root %}
<header class="site-header">
    <div class="site-frame">
        <nav class="navbar navbar-expand-lg" aria-label="Primary">
            <div class="site-header__bar w-100">
                <a class="site-brand" href="{{ site_root.url }}">
                    <span class="site-brand__mark">GT</span>
                    <span>
                        <span class="site-brand__eyebrow">Club Athletics</span>
                        <span class="site-brand__name">Georgia Tech Rowing</span>
                    </span>
                </a>
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive"
                        aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                    <span><i class="fas fa-bars"></i></span>
                </button>
                <div class="collapse navbar-collapse justify-content-end" id="navbarResponsive">
                    <ul class="navbar-nav">
                        {% block navigation %}
                        {% top_menu parent=site_root calling_page=self %}
                        <li class="nav-item">
                            {% if request.user.is_authenticated %}
                            <a class="nav-link" href="{% url 'account_logout' %}">Logout</a>
                            {% else %}
                            <a class="nav-link" href="{% url 'account_login' %}">Login</a>
                            {% endif %}
                        </li>
                        <li class="nav-item">
                            <a class="nav-link nav-link--cta" href="{% url 'team:index_member' %}">Member Portal</a>
                        </li>
                        {% endblock %}
                    </ul>
                </div>
            </div>
        </nav>
    </div>
</header>
